name: secretary-assistant-onboarding-validation

services:
  onboarding-validation-db:
    image: pgvector/pgvector:pg17
    shm_size: 128mb
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '55432:5432'
    volumes:
      - onboarding-validation-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  onboarding-validation-api:
    build:
      context: ./api
      target: build
    command: >
      sh -c "corepack enable &&
      CI=1 pnpm install --config.confirmModulesPurge=false &&
      pnpm migration:run &&
      pnpm start"
    volumes:
      - ./api:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - '3300:3000'
    env_file:
      - ./api/.env
      - ./.env.test
    environment:
      DB_HOST: onboarding-validation-db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: postgres
      NODE_ENV: development
      PORT: 3000
      E2E_AUTH_MODE: 'true'
      EVOLUTION_WEBHOOK_BASE_URL: http://onboarding-validation-api:3000
    depends_on:
      onboarding-validation-db:
        condition: service_healthy

  onboarding-validation-web:
    image: node:24-alpine
    working_dir: /usr/src/app
    command: >
      sh -c "corepack enable &&
      CI=1 pnpm install --config.confirmModulesPurge=false &&
      VITE_DEV_PROXY_TARGET=http://onboarding-validation-api:3000
      pnpm dev --host 0.0.0.0 --port 4173"
    volumes:
      - ./web:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - '4173:4173'
    env_file:
      - ./web/.env
      - ./.env.test
    environment:
      VITE_API_BASE_URL: /api
      VITE_E2E_AUTH_MOCK: 'true'
      VITE_AUTH0_APP_ORIGIN: http://localhost:4173
    depends_on:
      onboarding-validation-api:
        condition: service_started

volumes:
  onboarding-validation-db-data:
